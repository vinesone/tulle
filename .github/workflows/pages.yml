name: Deploy examples to GitHub Pages

# The examples are plain static files that import ../src/*.js with no build step,
# so publishing the repo as-is serves a working site. This uploads the checkout
# (tracked files only — node_modules and the ignored docs/ never reach it).

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# Never run two deploys at once; a newer push supersedes an in-flight one.
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/configure-pages@v5
        # Turn Pages on from the workflow itself, so no manual repo setting is
        # needed. Requires the `pages: write` permission above.
        with:
          enablement: true
      - uses: actions/upload-pages-artifact@v3
        with:
          path: '.'
      - id: deployment
        uses: actions/deploy-pages@v4
