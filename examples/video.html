<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Tulle — video</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <h1>TULLE / video</h1>

  <nav>
    <a href="index.html">index</a>
    <a href="basic.html">basic</a>
    <a href="video.html" aria-current="page">video</a>
    <a href="pointer.html">pointer</a>
    <a href="custom-effect.html">custom effect</a>
  </nav>

  <p class="note">
    A video element is just another source. <code>start()</code> owns the loop;
    each frame it hands the current video frame to <code>render()</code>.
  </p>

  <canvas id="canvas" width="640" height="360"></canvas>

  <div class="controls">

    <div class="card">
      <header>chromatic-aberration</header>
      <label>spread
        <input type="range" id="ca-spread" min="0" max="0.06" step="0.001" value="0.008">
        <output id="ca-spread-val">0.008</output>
      </label>
    </div>

    <div class="card">
      <header>grain</header>
      <label>amount
        <input type="range" id="grain-amount" min="0" max="0.3" step="0.005" value="0.06">
        <output id="grain-amount-val">0.060</output>
      </label>
      <label>speed
        <input type="range" id="grain-speed" min="0" max="4" step="0.1" value="1">
        <output id="grain-speed-val">1.0</output>
      </label>
    </div>

    <input type="file" id="file-input" accept="video/*" style="display:none">
    <button id="load-btn">load a video file</button>
  </div>

  <div class="status" id="status">starting…</div>

<script src="guard.js"></script>

<script type="module">
  import { Tulle }            from '../src/index.js'
  import { registerBuiltins } from '../src/effects/index.js'

  registerBuiltins(Tulle)

  const $ = id => document.getElementById(id)
  const canvas   = $('canvas')
  const statusEl = $('status')

  const video = document.createElement('video')
  video.muted = true          // autoplay is blocked without this
  video.loop  = true
  video.playsInline = true

  const tulle = new Tulle(canvas)
  tulle.chain([
    { name: 'chromatic-aberration', params: { spread: 0.008 } },
    { name: 'grain',                params: { amount: 0.06 } },
  ])

  // HAVE_CURRENT_DATA. Uploading a video with no decoded frame yet throws in
  // some browsers and uploads garbage in others, so skip the frame entirely.
  const READY = 2

  tulle.start(() => {
    if (video.readyState >= READY) tulle.render(video)
  })

  // Match the canvas to the video, so the aspect ratio survives. The renderer
  // reallocates its framebuffers when drawingBufferWidth changes.
  video.addEventListener('loadedmetadata', () => {
    const scale = Math.min(1, 960 / video.videoWidth)
    canvas.width  = Math.round(video.videoWidth  * scale)
    canvas.height = Math.round(video.videoHeight * scale)
  })

  // ── Sources ───────────────────────────────────────────────────────────────

  $('load-btn').addEventListener('click', () => $('file-input').click())

  let objectUrl = null

  $('file-input').addEventListener('change', event => {
    const file = event.target.files?.[0]
    if (!file) return

    stopGenerated()                                  // its rAF loop would run forever
    if (objectUrl) URL.revokeObjectURL(objectUrl)    // free the previous file

    objectUrl = URL.createObjectURL(file)
    video.srcObject = null
    video.src = objectUrl
    video.play().then(
      () => { statusEl.textContent = file.name; statusEl.classList.remove('error') },
      err => fail(`could not play that file — ${err.message}`),
    )
  })

  /**
   * No sample clip ships with the repo, so synthesise one: an animated 2D canvas
   * piped through captureStream() is a real MediaStream driving a real
   * HTMLVideoElement — the same code path a file or a webcam takes.
   */
  let generatedRaf = null
  const stopGenerated = () => {
    if (generatedRaf !== null) cancelAnimationFrame(generatedRaf)
    generatedRaf = null
  }

  function generatedClip() {
    const c = document.createElement('canvas')
    c.width = 640; c.height = 360
    const ctx = c.getContext('2d')

    const paint = now => {
      const t = now / 1000
      ctx.fillStyle = '#0d0d0d'
      ctx.fillRect(0, 0, c.width, c.height)

      for (let i = 0; i < 3; i++) {
        const phase = t * 0.7 + i * 2.1
        ctx.fillStyle = ['#e5484d', '#3ddc84', '#4d7ce5'][i]
        ctx.globalAlpha = 0.65
        ctx.beginPath()
        ctx.arc(
          c.width  / 2 + Math.cos(phase) * 180,
          c.height / 2 + Math.sin(phase * 1.3) * 90,
          70, 0, Math.PI * 2,
        )
        ctx.fill()
      }

      ctx.globalAlpha = 1
      ctx.fillStyle = '#fff'
      ctx.font = '20px monospace'
      ctx.fillText(`generated clip  t=${t.toFixed(1)}s`, 20, 34)

      generatedRaf = requestAnimationFrame(paint)
    }
    generatedRaf = requestAnimationFrame(paint)

    return c.captureStream(30)
  }

  const fail = msg => { statusEl.textContent = msg; statusEl.classList.add('error') }

  try {
    video.srcObject = generatedClip()
    video.play().then(
      () => { statusEl.textContent = 'generated clip — or load a video file' },
      err => fail(`autoplay blocked: ${err.message}`),
    )
  } catch (err) {
    fail(`captureStream unavailable: ${err.message} — load a video file instead`)
  }

  // ── Controls ──────────────────────────────────────────────────────────────
  const bind = (id, out, effect, param, digits) => {
    const input = $(id)
    const push = () => {
      const value = +input.value
      $(out).textContent = value.toFixed(digits)
      tulle.set(effect, { [param]: value })
    }
    input.addEventListener('input', push)
  }

  bind('ca-spread',    'ca-spread-val',    'chromatic-aberration', 'spread', 3)
  bind('grain-amount', 'grain-amount-val', 'grain',                'amount', 3)
  bind('grain-speed',  'grain-speed-val',  'grain',                'speed',  1)
</script>

</body>
</html>
