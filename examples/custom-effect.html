<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Tulle — custom effect</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <h1>TULLE / custom effect</h1>

  <nav>
    <a href="index.html">index</a>
    <a href="basic.html">basic</a>
    <a href="video.html">video</a>
    <a href="pointer.html">pointer</a>
    <a href="custom-effect.html" aria-current="page">custom effect</a>
    <a href="composite.html">composite</a>
    <a href="transparency.html">transparency</a>
    <a href="layout.html">layout</a>
    <a href="lut.html">LUT</a>
  </nav>

  <p class="note">
    Two effects that ship with nothing but a fragment shader and a defaults
    object. This is the whole extension API — the source of this page is the
    template.
  </p>

  <canvas id="canvas" width="600" height="400"></canvas>

  <div class="controls">
    <div class="card">
      <header>vignette</header>
      <label>amount
        <input type="range" id="vig-amount" min="0" max="2" step="0.02" value="1">
        <output id="vig-amount-val">1.00</output>
      </label>
    </div>

    <div class="card">
      <header>pixelate</header>
      <label>size
        <input type="range" id="pix-size" min="1" max="40" step="1" value="1">
        <output id="pix-size-val">1</output>
      </label>
    </div>
  </div>

  <div class="status" id="status">vignette → pixelate</div>

<script src="guard.js"></script>

<script type="module">
  import { Tulle, Effect }     from '../src/index.js'
  import { createTestPattern } from './test-pattern.js'

  // ── Vignette ──────────────────────────────────────────────────────────────
  // Declare the uniform types and Tulle binds them. No gl. calls anywhere.
  class Vignette extends Effect {
    static fragSrc = /* glsl */`#version 300 es
      precision highp float;
      in  vec2 vUv;
      out vec4 fragColor;

      uniform sampler2D u_source;
      uniform float     amount;

      void main() {
        float d = distance(vUv, vec2(0.5));
        fragColor = texture(u_source, vUv) * (1.0 - d * amount);
      }
    `
    static defaults = { amount: 1.0 }
    static uniforms = { amount: 'float' }
  }

  // ── Pixelate ──────────────────────────────────────────────────────────────
  // u_resolution is supplied automatically, which is what lets `size` mean
  // "pixels" rather than some arbitrary fraction of the frame.
  class Pixelate extends Effect {
    static fragSrc = /* glsl */`#version 300 es
      precision highp float;
      in  vec2 vUv;
      out vec4 fragColor;

      uniform sampler2D u_source;
      uniform vec2      u_resolution;
      uniform float     size;

      void main() {
        // size 1 must be an exact identity, not a near-identity: snap to the
        // centre of each cell so we sample the same texel we would have anyway.
        vec2 cells = u_resolution / max(size, 1.0);
        vec2 uv    = (floor(vUv * cells) + 0.5) / cells;
        fragColor  = texture(u_source, uv);
      }
    `
    static defaults = { size: 1.0 }
    static uniforms = { size: 'float' }
  }

  Tulle.register('vignette', Vignette)
      .register('pixelate', Pixelate)

  const $ = id => document.getElementById(id)

  const source = createTestPattern(600, 400)
  const tulle  = new Tulle($('canvas'))

  tulle.chain(['vignette', 'pixelate'])
       .start(() => tulle.render(source))

  const bind = (id, out, effect, param, digits) => {
    const input = $(id)
    input.addEventListener('input', () => {
      const value = +input.value
      $(out).textContent = value.toFixed(digits)
      tulle.set(effect, { [param]: value })
    })
  }

  bind('vig-amount', 'vig-amount-val', 'vignette', 'amount', 2)
  bind('pix-size',   'pix-size-val',   'pixelate', 'size',   0)
</script>

</body>
</html>
