<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Tulle — the web is video</title>
  <style>
    :root { color-scheme: dark }
    * { margin: 0; padding: 0; box-sizing: border-box }
    html, body { height: 100%; background: #05060f; overflow: hidden; overscroll-behavior: none }
    body { font-family: system-ui, -apple-system, "Segoe UI", Roboto, sans-serif }
    #stage { position: fixed; inset: 0; width: 100vw; height: 100vh; display: block; touch-action: none }
    .gh { position: fixed; z-index: 10; backdrop-filter: blur(6px);
      right: 20px; bottom: 18px; color: #fff; text-decoration: none; font-weight: 700; font-size: 13px; letter-spacing: .04em;
      padding: 8px 14px; border: 1px solid rgba(255,255,255,.35); border-radius: 999px; background: rgba(255,255,255,.05); transition: .2s }
    .gh:hover { background: rgba(255,255,255,.16); border-color: #fff }
    .nav { position: fixed; right: 22px; top: 50%; transform: translateY(-50%); z-index: 10;
      display: flex; flex-direction: column; gap: 14px; align-items: flex-end }
    .nav button { display: flex; align-items: center; gap: 10px; background: none; border: 0; cursor: pointer;
      color: rgba(255,255,255,.5); font: 600 11px/1 system-ui; letter-spacing: .18em; padding: 0 }
    .nav .dot { width: 9px; height: 9px; border-radius: 999px; background: rgba(255,255,255,.35); transition: .25s }
    .nav .label { opacity: 0; transition: .25s; text-transform: uppercase }
    .nav button:hover .label, .nav button.on .label { opacity: 1 }
    .nav button.on { color: #fff }
    .nav button.on .dot { background: #ff5470; box-shadow: 0 0 0 4px rgba(255,84,112,.25); transform: scale(1.25) }
    .loading { position: fixed; inset: 0; display: grid; place-items: center; color: #667; font: 13px/1 system-ui; letter-spacing: .3em; z-index: 5 }
  </style>
</head>
<body>
  <canvas id="stage"></canvas>
  <nav class="nav" id="nav"></nav>
  <a class="gh" href="https://github.com/vinesone/tulle" target="_blank" rel="noopener">Tulle on GitHub ↗</a>
  <div class="loading" id="loading">LOADING</div>

<script type="module">
  import { Tulle, box, block, wave, keyframes, easings, BlastField } from '../../src/ready.js'

  const canvas = document.getElementById('stage')
  const tulle  = new Tulle(canvas, { autoDestroy: false })
  const clamp01 = v => Math.max(0, Math.min(1, v))

  // ── Dither: additive low-amplitude noise that breaks up 8-bit banding, including
  // in the darks (an 'overlay' pass does nothing near black — this adds a little). ──
  function makeNoise() {
    const n = document.createElement('canvas'); n.width = n.height = 128
    const c = n.getContext('2d'), img = c.createImageData(128, 128)
    for (let i = 0; i < img.data.length; i += 4) {
      const v = Math.random() * 26
      img.data[i] = img.data[i + 1] = img.data[i + 2] = v; img.data[i + 3] = 255
    }
    c.putImageData(img, 0, 0); return n
  }
  const NOISE = makeNoise()
  function dither(x, w, h) {
    x.save(); x.globalCompositeOperation = 'lighter'; x.globalAlpha = 0.55
    x.fillStyle = x.createPattern(NOISE, 'repeat'); x.fillRect(0, 0, w, h); x.restore()
  }

  function gradient(stops, w, h, angle = 90) {
    const c = document.createElement('canvas'); c.width = w; c.height = h
    const x = c.getContext('2d')
    const a = angle * Math.PI / 180, dx = Math.cos(a) * w / 2, dy = Math.sin(a) * h / 2
    const g = x.createLinearGradient(w / 2 - dx, h / 2 - dy, w / 2 + dx, h / 2 + dy)
    for (const [o, col] of stops) g.addColorStop(o, col)
    x.fillStyle = g; x.fillRect(0, 0, w, h); dither(x, w, h); return c
  }
  function beams(w, h, cols) {
    const c = document.createElement('canvas'); c.width = w; c.height = h
    const x = c.getContext('2d'); x.fillStyle = '#05060f'; x.fillRect(0, 0, w, h)
    const bw = w / cols.length
    cols.forEach((col, i) => {
      const g = x.createLinearGradient(0, 0, 0, h); g.addColorStop(0, col); g.addColorStop(1, 'rgba(0,0,0,0)')
      x.fillStyle = g; x.fillRect(i * bw, 0, bw + 1, h)
    })
    dither(x, w, h); return c
  }

  // ── A LIVE generated "video" feed (animated canvas, dithered each frame). It's the
  // fallback / ambient source; a real tulle.clip(...) takes over when you load one. ──
  const feed = document.createElement('canvas'); feed.width = 640; feed.height = 360
  const fx = feed.getContext('2d')
  const BLOBS = [['#ff5470', 0.1], ['#4cc9f0', 0.4], ['#ffd166', 0.7], ['#06d6a0', 0.95], ['#8367c7', 1.3]]
  function drawFeed(t) {
    const w = feed.width, h = feed.height
    fx.globalCompositeOperation = 'source-over'; fx.fillStyle = '#0a0a16'; fx.fillRect(0, 0, w, h)
    fx.globalCompositeOperation = 'lighter'
    BLOBS.forEach(([col, ph], i) => {
      const cx = w * (0.5 + 0.42 * Math.sin(t * 0.6 + ph * 6))
      const cy = h * (0.5 + 0.42 * Math.cos(t * 0.8 + ph * 5))
      const r = Math.min(w, h) * (0.36 + 0.12 * Math.sin(t * 1.4 + i))
      const g = fx.createRadialGradient(cx, cy, 0, cx, cy, r)
      g.addColorStop(0, col); g.addColorStop(1, 'rgba(0,0,0,0)')
      fx.fillStyle = g; fx.beginPath(); fx.arc(cx, cy, r, 0, 7); fx.fill()
    })
    dither(fx, w, h) // kill the radial-gradient rings
  }

  // ── The real video (Clip). Its lifecycle drives the swap: the generated feed
  // holds the frame until 'ready', then the footage takes over seamlessly. ──────
  let clip = null
  let videoSource = feed          // what the video sections sample right now

  // If a codec can't play (e.g. an older Safari with VP9), fall back to a
  // CORS-clean mp4 — a real video ALWAYS plays with zero user action.
  const FALLBACK_MP4 = 'https://interactive-examples.mdn.mozilla.net/media/cc0-videos/flower.mp4'
  let fellBack = false
  const fallback = () => { if (!fellBack) { fellBack = true; useClip(FALLBACK_MP4) } }

  function useClip(src, startAt = 0) {
    if (clip) clip.destroy()
    clip = tulle.clip(src, { autoplay: true, muted: true, loop: true, crossOrigin: 'anonymous' })
    clip.on('ready', () => {
      if (startAt) clip.seek(startAt)   // skip past any title cards in the opening
      videoSource = clip; rebuild()
    })
    clip.on('error', () => {
      if (videoSource === clip) { videoSource = feed; rebuild() }
      clip = null
      fallback()
    })
  }

  // ── Viewport-dependent build ─────────────────────────────────────────────────
  let W = 0, H = 0, anchors = []
  const reveal = top => ctx => clamp01((H * 0.9 - (top - ctx.scrollY)) / (H * 0.75))
  const gone   = ctx => clamp01(ctx.scrollY / (H * 0.85))
  const frac   = ctx => ctx.scrollY / (tulle.scrollMax.y || 1)
  const T = (str, h, opts = {}) => tulle.text(str, { width: W, height: h, align: 'center', vAlign: 'middle', weight: 900, color: '#fff', ...opts })
  const u = () => Math.min(W, H)
  const SECTIONS = ['intro', 'video', 'shaders', 'kinetic', 'compose', '2026']

  function build() {
    const heroH = H, secH = Math.round(H * 1.15), outroH = H, U = u()
    const glow = a => ({ color: 'rgba(255,255,255,' + a + ')', blur: Math.round(U * 0.07) })
    let top = 0; const at = h => { const t = top; top += h; return t }

    // A section is a POSITIONED container of absolute layers, so background, headline
    // and caption truly overlap. (A plain block would stack them vertically — that was
    // the bug that pushed every title a full screen below its backdrop.)
    const overlay = (src, h, o = {}) => box(src, { position: 'absolute', width: W, height: h, offset: { left: 0, top: 0 }, ...o })
    const section = (h, children) => block(children, { position: 'relative', width: W, height: h })
    const caption = (str, h, o = {}) => overlay(
      T(str, h, { size: Math.max(14, U * 0.023), weight: 600, color: 'rgba(255,255,255,.72)', vAlign: 'bottom', padding: Math.round(h * 0.12) }), h, o)

    // ── HERO — the LIVE VIDEO fills it, the title sits solid on top ──
    const px = ctx => (ctx.pointer ? ctx.pointer.u - 0.5 : 0)   // pointer parallax, -0.5..0.5
    const py = ctx => (ctx.pointer ? 0.5 - ctx.pointer.v : 0)   // (v is bottom-up)
    const t0 = at(heroH)
    const hero = section(heroH, [
      overlay(videoSource, heroH, { fit: 'cover',
        opacity: ctx => (videoSource === feed ? 0.45 : 0.9) - gone(ctx) * 0.4,
        offset: { left: ctx => px(ctx) * -18, top: ctx => py(ctx) * -12 },   // video drifts against the mouse
        effects: [{ name: 'grade', params: { saturation: 1.25, contrast: 1.05 } }] }),
      // SOLID WHITE type with a deep dark shadow so it punches over the live footage.
      overlay(T('THE WEB\nIS VIDEO', heroH, { size: Math.min(W * 0.15, U * 0.32), lineHeight: 0.9, color: '#ffffff', shadow: { color: 'rgba(0,0,0,.8)', blur: 36 } }), heroH, {
        offset: { left: ctx => px(ctx) * 26, top: ctx => -gone(ctx) * H * 0.25 + py(ctx) * 18 },
        opacity: ctx => 1 - gone(ctx) }),
      caption('click anywhere for a shockwave', heroH, { opacity: ctx => 1 - gone(ctx) }),
    ])

    // ── VIDEO — the live source, full-bleed, clarifying out of a broken signal ──
    const t1 = at(secH); const r1 = reveal(t1), a1 = ctx => 1 - easings.outCubic(r1(ctx))
    const hasClip = videoSource !== feed
    const video = section(secH, [
      // footage drifts AGAINST the mouse, title leans WITH it — same depth as the hero
      overlay(videoSource, secH, { fit: 'cover', opacity: ctx => 0.4 + 0.6 * easings.outCubic(r1(ctx)),
        offset: { left: ctx => px(ctx) * -20, top: ctx => py(ctx) * -14 },
        effects: [
          { name: 'pixelate', params: { size: ctx => 1 + a1(ctx) * 44 } },
          { name: 'chromatic-aberration', params: { spread: ctx => a1(ctx) * 0.14 } },
        ] }),
      overlay(T('EMBED\nANY VIDEO', secH, { size: Math.min(W * 0.12, U * 0.22), lineHeight: 0.95, shadow: { color: 'rgba(0,0,0,.6)', blur: 34 } }), secH, {
        offset: { left: ctx => px(ctx) * 30, top: ctx => py(ctx) * 20 },
        opacity: ctx => easings.outCubic(r1(ctx)) }),
      caption(hasClip ? 'real footage through the shader pipeline — drop any video onto the page to swap it'
                      : 'loading footage… (or drop any video file onto the page)', secH),
    ])

    // ── SHADERS ──
    const t2 = at(secH); const r2 = reveal(t2), a2 = ctx => 1 - easings.outCubic(r2(ctx))
    // The glow FLASHES in as the section hits viewport centre, then eases back to
    // subtle: two text layers (soft glow + a brighter one) crossfaded by how close
    // the section centre is to the middle of the screen. A TIGHT window with a
    // sharp curve, so it reads as a flash, not ambient haze.
    const c2 = t2 + secH / 2 - H / 2   // scroll position where this section is centred
    const centered2 = ctx => { const d = Math.abs(ctx.scrollY - c2) / (H * 0.24); return d >= 1 ? 0 : (1 - d) ** 1.7 }
    const pixelsTxt = o => T('NO PLAYERS.\nNO EXPORTS.\nJUST PIXELS.', secH, { size: Math.min(W * 0.1, U * 0.2), lineHeight: 1.0, color: '#0b0b12', ...o })
    const shaders = section(secH, [
      overlay(beams(W, secH, ['#06d6a0', '#118ab2', '#8367c7', '#4cc9f0', '#ff5470']), secH, { fit: 'cover',
        opacity: ctx => 0.3 + 0.7 * easings.outCubic(r2(ctx)),
        effects: [{ name: 'ripple', params: { amplitude: ctx => 0.006 + a2(ctx) * 0.05, frequency: 20, speed: 3 } }] }),
      // base: barely-there glow, always readable
      overlay(pixelsTxt({ shadow: { color: 'rgba(255,255,255,.3)', blur: Math.round(U * 0.03) } }), secH, {
        opacity: ctx => 0.15 + 0.85 * easings.outCubic(r2(ctx)),
        effects: [{ name: 'chromatic-aberration', params: { spread: ctx => a2(ctx) * 0.24 } }] }),
      // flash: a brighter halo that spikes dead-centre, then shrinks away
      overlay(pixelsTxt({ shadow: { color: 'rgba(255,255,255,.95)', blur: Math.round(U * 0.055) } }), secH, {
        opacity: centered2 }),
    ])

    // ── KINETIC TYPE — a taller section (so it lingers) with three big, centred
    // words, each a DIFFERENT live text shader that runs the whole time it's on
    // screen (they animate off time, not a one-shot). ──
    const kH = Math.round(H * 1.4)
    const t3 = at(kH); const r3 = reveal(t3)
    const rowH = Math.round(kH * 0.26)
    const KW = [
      { w: 'RIPPLE',   c: '#4cc9f0', fx: [{ name: 'ripple', params: { amplitude: 0.045, frequency: 14, speed: 5 } }] },
      { w: 'SPLIT',    c: '#ff5470', fx: [{ name: 'chromatic-aberration', params: { spread: ctx => 0.02 + 0.03 * (0.5 + 0.5 * Math.sin(ctx.time * 4)) } }] },
      { w: 'DISSOLVE', c: '#ffd166', fx: [{ name: 'pixelate', params: { size: ctx => 1 + 26 * (0.5 + 0.5 * Math.sin(ctx.time * 1.6)) } }] },
    ]
    const kinetic = section(kH, [
      overlay(gradient([[0, '#241448'], [1, '#05060f']], W, kH, 90), kH, { fit: 'cover', opacity: ctx => 0.4 + 0.6 * easings.outCubic(r3(ctx)) }),
      ...KW.map((k, i) => box(
        T(k.w, rowH, { size: Math.min(W * 0.13, U * 0.24), align: 'center', color: k.c, shadow: { color: 'rgba(0,0,0,.5)', blur: 22 } }),
        { position: 'absolute', width: W, height: rowH,
          // full-width & centred so they never wander off; a gentle vertical bob
          offset: { left: 0, top: ctx => Math.round(kH * (0.1 + i * 0.28)) + Math.sin(ctx.time * (1.1 + i * 0.4) + i) * 14 },
          opacity: ctx => easings.outCubic(r3(ctx)), effects: k.fx }),
      ),
    ])

    // ── COMPOSE ──
    const t4 = at(secH); const r4 = reveal(t4), a4 = ctx => 1 - easings.outCubic(r4(ctx))
    const compose = section(secH, [
      overlay(gradient([[0, '#8367c7'], [0.5, '#4361ee'], [1, '#06d6a0']], W, secH, 120), secH, { fit: 'cover', opacity: ctx => 0.3 + 0.7 * easings.outCubic(r4(ctx)) }),
      overlay(T('COMPOSE\nANIMATE\nSCROLL', secH, { size: Math.min(W * 0.1, U * 0.2), lineHeight: 0.98, color: '#0b0b12', shadow: glow(0.6) }), secH, {
        opacity: ctx => 0.15 + 0.85 * easings.outCubic(r4(ctx)),
        effects: [{ name: 'shatter', params: { progress: a4, cells: 24, blast: 1.3, drip: 0.45 } }] }),
    ])

    // ── OUTRO ──
    const t5 = at(outroH); const r5 = reveal(t5), a5 = ctx => 1 - easings.outCubic(r5(ctx))
    const outro = section(outroH, [
      overlay(gradient([[0, '#05060f'], [1, '#241448']], W, outroH, 90), outroH, { fit: 'cover' }),
      overlay(T('WELCOME\nTO 2026', outroH, { size: Math.min(W * 0.13, U * 0.26), lineHeight: 0.92, shadow: { color: 'rgba(0,0,0,.5)', blur: 24 } }), outroH, {
        opacity: ctx => easings.outCubic(r5(ctx)),
        effects: [
          { name: 'scanlines', params: { count: Math.round(H / 3), intensity: 0.25, speed: 0.6 } },
          { name: 'blur', params: { radius: ctx => a5(ctx) * 36 } },
        ] }),
      caption('built with Tulle — no build step, no gl. calls', outroH),
    ])

    // Just enough tail for the outro to settle — no long dead zone at the end.
    const tail = box(document.createElement('canvas'), { width: W, height: Math.round(H * 0.15) })

    const secDefs = [[t0, heroH], [t1, secH], [t2, secH], [t3, kH], [t4, secH], [t5, outroH]]
    anchors = secDefs.map(([tp, h]) => tp + h / 2 - H / 2)
    const mid = i => (anchors[i] + anchors[i + 1]) / 2
    const pulse = (m, w, amp = 1) => ctx => { const d = Math.abs(ctx.scrollY - m); return d >= w ? 0 : amp * 0.5 * (1 + Math.cos((d / w) * Math.PI)) }

    // Fixed HUD.
    const brand = T('TULLE', 60, { size: 24, align: 'left', vAlign: 'middle', padding: 22, weight: 800 })
    const cue   = T('scroll ↓', 40, { size: 16, weight: 600, color: 'rgba(255,255,255,.8)' })
    const barPx = document.createElement('canvas'); barPx.width = barPx.height = 8
    barPx.getContext('2d').fillStyle = '#ff5470'; barPx.getContext('2d').fillRect(0, 0, 8, 8)
    const sky = gradient([[0, '#0b1026'], [0.5, '#1b1140'], [1, '#05060f']], W, Math.round(H * 1.3), 115)

    tulle.layout(
      block([
        box(sky, { position: 'fixed', fit: 'cover', width: W, height: Math.round(H * 1.3), offset: { left: 0, top: ctx => -frac(ctx) * H * 0.3 },
          effects: [{ name: 'grade', params: { exposure: ctx => 1 + 0.06 * Math.sin(ctx.time * 0.6), saturation: 1.1 } }] }),
        block([hero, video, shaders, kinetic, compose, outro, tail]),
        box(brand, { position: 'fixed', offset: { top: 0, left: 0 }, width: W, height: 60 }),
        box(barPx, { position: 'fixed', fit: 'fill', height: 3, offset: { top: 60, left: 0 }, width: ctx => Math.max(2, frac(ctx) * W) }),
        box(cue,   { position: 'fixed', width: 160, height: 40, offset: { bottom: 20, left: Math.round((W - 160) / 2) }, opacity: ctx => 1 - gone(ctx) }),
      ]),
      { scroll: 'y', width: W, height: H },
    )

    const w = H * 0.26
    tulle.post([
      // Click anywhere → a shockwave ripples the ENTIRE composited frame.
      { name: 'shockwave', params: { blasts: BLASTS.buffer(), amplitude: 0.09, width: 0.07, speed: 1.1 } },
      { name: 'invert',    params: { amount: pulse(mid(0), w) } },
      { name: 'duotone',   params: { amount: pulse(mid(1), w, 0.95), dark: [0.04, 0.02, 0.16], light: [1, 0.45, 0.6] } },
      { name: 'chromatic-aberration', params: { spread: pulse(mid(2), w, 0.16) } },
      { name: 'posterize', params: { levels: ctx => Math.round(2 + (1 - pulse(mid(3), w)(ctx)) * 30) } },
      { name: 'grade',     params: { exposure: ctx => 1 + pulse(mid(4), w, 2.2)(ctx) } }, // bloom flash (1 = neutral)
      { name: 'vignette',  params: { amount: 0.5 } },
      { name: 'grain',     params: { amount: 0.12, colored: true } }, // heavier: also dithers post-pipeline banding
    ])
  }

  // ── Click → shockwave, anywhere on the page (Tulle tracks the pointer) ───────
  const BLASTS = new BlastField()
  tulle.on('pointerdown', p => BLASTS.detonate(p.u, p.v, tulle.frame.time))

  // ── Nav (jump to a state, smooth glide) ──────────────────────────────────────
  const nav = document.getElementById('nav')
  let glideTarget = null
  SECTIONS.forEach((name, i) => {
    const b = document.createElement('button')
    b.innerHTML = '<span class="label">' + name + '</span><span class="dot"></span>'
    b.onclick = () => { glideTarget = anchors[i] ?? 0 }
    nav.appendChild(b)
  })
  const dots = [...nav.children]
  const cancelGlide = () => { glideTarget = null }
  canvas.addEventListener('wheel', cancelGlide, { passive: true })
  canvas.addEventListener('touchstart', cancelGlide, { passive: true })

  tulle.on('frame', ({ time, scrollY }) => {
    drawFeed(time)
    if (glideTarget != null) {
      const d = glideTarget - tulle.scrollY
      if (Math.abs(d) < 1.5) { tulle.scrollTo(0, glideTarget); glideTarget = null }
      else tulle.scrollTo(0, tulle.scrollY + d * 0.16)
    }
    let near = 0, best = Infinity
    anchors.forEach((a, i) => { const d = Math.abs(scrollY - a); if (d < best) { best = d; near = i } })
    dots.forEach((el, i) => el.classList.toggle('on', i === near))
  })

  // Drag-drop any video to swap the source (quiet power feature; no UI).
  window.addEventListener('dragover', e => e.preventDefault())
  window.addEventListener('drop', e => { e.preventDefault(); const f = e.dataTransfer.files[0]; if (f && f.type.startsWith('video')) useClip(URL.createObjectURL(f)) })

  // ── Fullscreen sizing + rebuild, preserving scroll ───────────────────────────
  function rebuild() {
    const keep = tulle.scrollMax.y ? tulle.scrollY / tulle.scrollMax.y : 0
    build(); tulle.render(); tulle.scrollTo(0, keep * tulle.scrollMax.y)
  }
  function resize() {
    const dpr = Math.min(window.devicePixelRatio || 1, 1.5)
    W = window.innerWidth; H = window.innerHeight
    canvas.width = Math.round(W * dpr); canvas.height = Math.round(H * dpr)
    rebuild()
  }
  let rt = 0
  window.addEventListener('resize', () => { clearTimeout(rt); rt = setTimeout(resize, 120) })

  let ty = 0
  canvas.addEventListener('touchstart', e => { ty = e.touches[0].clientY }, { passive: true })
  canvas.addEventListener('touchmove', e => { const y = e.touches[0].clientY; tulle.scrollBy(0, (ty - y) * 1.5); ty = y }, { passive: true })

  resize()
  tulle.play()
  document.getElementById('loading').remove()

  // Autoplay real footage — an FPV drone flight along the Oregon coast (Wikimedia
  // Commons, CC-licensed, CORS-verified). A plain webm: no player library at all,
  // just tulle.clip(url). No user action needed; drag-drop overrides.
  useClip('https://upload.wikimedia.org/wikipedia/commons/transcoded/4/40/Oregon_Coast_Odyssey-_FPV_Drone_Captures_Stunning_Ocean_Views.webm/Oregon_Coast_Odyssey-_FPV_Drone_Captures_Stunning_Ocean_Views.webm.720p.vp9.webm', 2)
</script>
</body>
</html>
