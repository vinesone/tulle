<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Tulle — effect chain</title>
  <link rel="stylesheet" href="style.css">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0 }

    body {
      background: #0d0d0d;
      color: #ccc;
      font: 14px/1.5 monospace;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 16px;
      padding: 32px;
      min-height: 100vh;
    }

    h1 { font-size: 1rem; letter-spacing: 0.15em; color: #666 }

    #canvas {
      max-width: 100%;
      border: 1px solid #222;
      display: block;
    }

    .controls {
      display: flex;
      flex-direction: column;
      gap: 12px;
      width: min(600px, 100%);
    }

    /* One effect = one card. Dim it when the effect is off the pipeline. */
    .effect {
      border: 1px solid #222;
      padding: 12px;
      display: flex;
      flex-direction: column;
      gap: 8px;
    }
    .effect[data-on="false"] .params { opacity: 0.35; pointer-events: none }

    .effect > header {
      display: flex;
      align-items: center;
      gap: 8px;
      color: #7f5af0;
      letter-spacing: 0.08em;
    }
    .effect > header label { cursor: pointer; flex: 1 }

    .params { display: flex; flex-direction: column; gap: 6px }

    label {
      display: flex;
      justify-content: space-between;
      gap: 12px;
      align-items: center;
    }

    input[type=range] { flex: 1; accent-color: #7f5af0 }
    input[type=checkbox] { accent-color: #7f5af0 }

    output { width: 4em; text-align: right; color: #888 }

    #pipeline {
      color: #555;
      font-size: 0.85em;
      text-align: center;
      min-height: 1.4em;
    }

    #load-btn {
      padding: 8px 16px;
      background: #1a1a1a;
      border: 1px solid #333;
      color: #ccc;
      cursor: pointer;
      font: inherit;
      width: 100%;
    }
    #load-btn:hover { border-color: #7f5af0; color: #fff }

    #status { color: #555; font-size: 0.85em; text-align: center }
  </style>
</head>
<body>

  <h1>TULLE / effect chain</h1>

  <nav>
    <a href="index.html">index</a>
    <a href="basic.html" aria-current="page">basic</a>
    <a href="video.html">video</a>
    <a href="pointer.html">pointer</a>
    <a href="custom-effect.html">custom effect</a>
  </nav>

  <canvas id="canvas" width="600" height="400"></canvas>

  <div class="controls">

    <div id="pipeline"></div>

    <section class="effect" data-effect="blur" data-on="false">
      <header><input type="checkbox" id="blur-on"><label for="blur-on">blur</label></header>
      <div class="params">
        <label>radius
          <input type="range" id="blur-radius" min="0" max="20" step="0.5" value="4">
          <output id="blur-radius-val">4.0</output>
        </label>
      </div>
    </section>

    <section class="effect" data-effect="grain" data-on="false">
      <header><input type="checkbox" id="grain-on"><label for="grain-on">grain</label></header>
      <div class="params">
        <label>amount
          <input type="range" id="grain-amount" min="0" max="0.3" step="0.005" value="0.08">
          <output id="grain-amount-val">0.080</output>
        </label>
        <label>size
          <input type="range" id="grain-size" min="1" max="6" step="1" value="1">
          <output id="grain-size-val">1</output>
        </label>
        <label style="justify-content:flex-start">
          <input type="checkbox" id="grain-colored"> colored
        </label>
      </div>
    </section>

    <section class="effect" data-effect="chromatic-aberration" data-on="true">
      <header><input type="checkbox" id="ca-on" checked><label for="ca-on">chromatic-aberration</label></header>
      <div class="params">
        <label>spread
          <input type="range" id="ca-spread" min="0" max="0.08" step="0.001" value="0.01">
          <output id="ca-spread-val">0.010</output>
        </label>
        <label style="justify-content:flex-start">
          <input type="checkbox" id="ca-animate"> animate (sin wave)
        </label>
      </div>
    </section>

    <input type="file" id="file-input" accept="image/*" style="display:none">
    <button id="load-btn">load image</button>

    <div id="status">no image loaded — using generated test pattern</div>
  </div>

<!--
  Classic (non-module) script on purpose: over file:// the module script below
  is blocked by CORS before it runs, so only a classic script can report why.
-->
<script>
  if (location.protocol === 'file:') {
    const s = document.getElementById('status')
    s.innerHTML =
      'This page must be served over http://, not opened as a file.<br>' +
      'ES module imports are blocked by CORS on file:// origins.<br><br>' +
      'Run <b>npm run dev</b> from the project root, then open<br>' +
      '<b>http://localhost:8080/examples/basic.html</b>'
    s.style.color = '#e5484d'
  }
</script>

<script type="module">
  import { Tulle }            from '../src/core/Tulle.js'
  import { registerBuiltins } from '../src/effects/index.js'

  registerBuiltins(Tulle)

  const $ = id => document.getElementById(id)

  const canvas    = $('canvas')
  const pipelineEl = $('pipeline')
  const statusEl  = $('status')
  const loadBtn   = $('load-btn')
  const fileInput = $('file-input')

  const tulle = new Tulle(canvas)

  // ── Pipeline description ────────────────────────────────────────────────
  // Order is fixed: blur softens, grain adds texture on top, aberration is a
  // lens artifact so it goes last. Each entry knows how to read its own params
  // out of the DOM.
  const EFFECTS = [
    {
      name: 'blur',
      toggle: $('blur-on'),
      params: () => ({ radius: +$('blur-radius').value }),
    },
    {
      name: 'grain',
      toggle: $('grain-on'),
      params: () => ({
        amount:  +$('grain-amount').value,
        size:    +$('grain-size').value,
        colored: $('grain-colored').checked,
      }),
    },
    {
      name: 'chromatic-aberration',
      toggle: $('ca-on'),
      params: () => ({ spread: +$('ca-spread').value }),
    },
  ]

  /** Names currently compiled into the pipeline — set() throws on anything else. */
  let live = new Set()

  function rebuild() {
    const steps = EFFECTS
      .filter(e => e.toggle.checked)
      .map(e => ({ name: e.name, params: e.params() }))

    for (const e of EFFECTS)
      e.toggle.closest('.effect').dataset.on = String(e.toggle.checked)

    if (steps.length === 0) {
      // Nothing selected. Blur at radius 0 collapses every tap onto the centre
      // texel, so it's an exact identity — cheaper than a special-case branch.
      pipelineEl.textContent = 'source (no effects)'
      steps.push({ name: 'blur', params: { radius: 0 } })
      live = new Set()          // ← not user-visible, so set() must not target it
    } else {
      pipelineEl.textContent = steps.map(s => s.name).join('  →  ')
      live = new Set(steps.map(s => s.name))
    }

    tulle.chain(steps)
  }

  /** Push a live param change to the GPU — no recompile. */
  const update = (name, params) => { if (live.has(name)) tulle.set(name, params) }

  // ── Test pattern (fallback source) ──────────────────────────────────────
  const srcCanvas = document.createElement('canvas')
  srcCanvas.width  = 600
  srcCanvas.height = 400
  const ctx = srcCanvas.getContext('2d')

  function drawTestPattern() {
    const { width: w, height: h } = srcCanvas

    const bg = ctx.createRadialGradient(w/2, h/2, 0, w/2, h/2, w/1.5)
    bg.addColorStop(0,   '#3b1f6e')
    bg.addColorStop(0.4, '#1a0a40')
    bg.addColorStop(1,   '#000')
    ctx.fillStyle = bg
    ctx.fillRect(0, 0, w, h)

    ctx.strokeStyle = 'rgba(255,255,255,0.07)'
    ctx.lineWidth = 1
    for (let x = 0; x < w; x += 40) { ctx.beginPath(); ctx.moveTo(x, 0); ctx.lineTo(x, h); ctx.stroke() }
    for (let y = 0; y < h; y += 40) { ctx.beginPath(); ctx.moveTo(0, y); ctx.lineTo(w, y); ctx.stroke() }

    const bands = [
      ['rgba(255,60,60,0.6)',  w * 0.2, h * 0.5, 120, 120],
      ['rgba(60,255,120,0.6)', w * 0.5, h * 0.5, 120, 120],
      ['rgba(60,120,255,0.6)', w * 0.8, h * 0.5, 120, 120],
    ]
    bands.forEach(([color, cx, cy, rx, ry]) => {
      ctx.fillStyle = color
      ctx.beginPath()
      ctx.ellipse(cx, cy, rx, ry, 0, 0, Math.PI * 2)
      ctx.fill()
    })

    const dot = ctx.createRadialGradient(w/2, h/2, 0, w/2, h/2, 60)
    dot.addColorStop(0, 'rgba(255,255,255,0.9)')
    dot.addColorStop(1, 'rgba(255,255,255,0)')
    ctx.fillStyle = dot
    ctx.beginPath()
    ctx.arc(w/2, h/2, 60, 0, Math.PI * 2)
    ctx.fill()
  }

  drawTestPattern()

  // ── Render loop ─────────────────────────────────────────────────────────
  let source = srcCanvas

  function renderFrame(t = 0) {
    if ($('ca-animate').checked) {
      const spread = Math.max(0, 0.005 + Math.sin(t * 0.001) * 0.04)
      $('ca-spread').value = spread
      $('ca-spread-val').textContent = spread.toFixed(3)
      update('chromatic-aberration', { spread })
    }

    tulle.render(source)
    requestAnimationFrame(renderFrame)
  }

  // ── Controls ────────────────────────────────────────────────────────────

  // Toggling an effect changes the pipeline shape → recompile.
  for (const e of EFFECTS) e.toggle.addEventListener('change', rebuild)

  // Changing a param does not → push straight to the GPU.
  const sliders = [
    ['blur-radius',   v => v.toFixed(1), () => update('blur', { radius: +$('blur-radius').value })],
    ['grain-amount',  v => v.toFixed(3), () => update('grain', { amount: +$('grain-amount').value })],
    ['grain-size',    v => v.toFixed(0), () => update('grain', { size: +$('grain-size').value })],
    ['ca-spread',     v => v.toFixed(3), () => update('chromatic-aberration', { spread: +$('ca-spread').value })],
  ]
  for (const [id, fmt, push] of sliders) {
    const el = $(id)
    el.addEventListener('input', () => {
      $(`${id}-val`).textContent = fmt(+el.value)
      push()
    })
  }

  $('grain-colored').addEventListener('change', () =>
    update('grain', { colored: $('grain-colored').checked }))

  loadBtn.addEventListener('click', () => fileInput.click())

  fileInput.addEventListener('change', () => {
    const file = fileInput.files[0]
    if (!file) return

    const img = new Image()
    const url = URL.createObjectURL(file)

    img.onload = () => {
      const scale = Math.min(1, 600 / img.naturalWidth)
      const w = Math.round(img.naturalWidth  * scale)
      const h = Math.round(img.naturalHeight * scale)

      srcCanvas.width  = w
      srcCanvas.height = h
      ctx.drawImage(img, 0, 0, w, h)

      canvas.width  = w
      canvas.height = h

      source = srcCanvas
      URL.revokeObjectURL(url)
      statusEl.textContent = `${file.name} — ${img.naturalWidth}×${img.naturalHeight}`
    }

    img.onerror = () => {
      URL.revokeObjectURL(url)
      statusEl.textContent = `couldn't load ${file.name}`
    }

    img.src = url
  })

  rebuild()
  requestAnimationFrame(renderFrame)
</script>
</body>
</html>
